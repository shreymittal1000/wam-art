# Smoke test configuration
seed: 42
device: cpu

wam:
  name: "dummy"
  latent_dim: 128
  action_dim: 7
  checkpoint_path: null

editing:
  factors:
    - name: "noise_light"
      type: "noise"
      magnitude: 0.05
    - name: "noise_heavy"
      type: "noise"
      magnitude: 0.15
    - name: "bright"
      type: "brightness"
      magnitude: 0.20
    - name: "dark"
      type: "darkness"
      magnitude: 0.20

anomaly:
  k_neighbors: 5
  calibration_ratio: 0.5
  nominal_failure_rate: 0.05  # so target anomaly rate = 0.05

eval:
  nominal_samples: 100
  edited_per_factor: 50
